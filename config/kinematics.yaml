ur_manipulator:
  # TRAC-IK: faster + far more reliable than KDL, respects joint limits as a hard
  # constraint, and with solve_type=Distance returns the IK solution closest to the
  # seed state in joint space — eliminates random wrist flips and gives smooth,
  # predictable motion. Important when wires/cables are routed along the arm.
  kinematics_solver: trac_ik_kinematics_plugin/TRAC_IKKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
  solve_type: Distance        # alternatives: Speed, Manip1, Manip2
  position_only_ik: false
  epsilon: 1e-5
