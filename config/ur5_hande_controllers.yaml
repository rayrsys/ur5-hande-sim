controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    forward_position_controller:
      type: position_controllers/JointGroupPositionController

    hande_gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController


joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint:   { trajectory: 0.2, goal: 0.1 }
      shoulder_lift_joint:  { trajectory: 0.2, goal: 0.1 }
      elbow_joint:          { trajectory: 0.2, goal: 0.1 }
      wrist_1_joint:        { trajectory: 0.2, goal: 0.1 }
      wrist_2_joint:        { trajectory: 0.2, goal: 0.1 }
      wrist_3_joint:        { trajectory: 0.2, goal: 0.1 }


scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: ""
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint:   { trajectory: 0.2, goal: 0.1 }
      shoulder_lift_joint:  { trajectory: 0.2, goal: 0.1 }
      elbow_joint:          { trajectory: 0.2, goal: 0.1 }
      wrist_1_joint:        { trajectory: 0.2, goal: 0.1 }
      wrist_2_joint:        { trajectory: 0.2, goal: 0.1 }
      wrist_3_joint:        { trajectory: 0.2, goal: 0.1 }


forward_velocity_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: velocity


forward_position_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint


# Robotiq Hand-E gripper controller. Hand-E's <ros2_control> exposes only
# position command + position/velocity state on robotiq_hande_left_finger_joint
# (right finger is a mimic). No effort interface, so max_effort_interface is
# left empty -> controller falls back to the fixed max_effort param.
# Position units are METERS (prismatic joint), range 0.0 (closed) -> 0.025 (open).
hande_gripper_controller:
  ros__parameters:
    joint: robotiq_hande_left_finger_joint
    max_effort: 130.0
    max_velocity: 0.15
    state_interfaces: ["position", "velocity"]
    allow_stalling: true
    stall_timeout: 0.1
    goal_tolerance: 0.001
